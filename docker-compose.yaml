services:
  gateway:
    build: gateway
    # ports:
    # TODO: to be decided
    restart: unless-stopped

  broker:
    image: eclipse-mosquitto:alpine
    ports:
      - 1883:1883
      # TODO: add ports for websockets
    volumes:
      - ./broker/config:/mosquitto/config
      - ./broker/data:/mosquitto/data
      - ./broker/log:/mosquitto/log
    restart: unless-stopped

  cloud:
    build: cloud
    ports:
      - 1880:1880
    volumes:
      # persistent data
      - ./cloud/data:/data
      # protobuf definitions
      - ./shared/message.proto:/message.proto
    restart: unless-stopped
