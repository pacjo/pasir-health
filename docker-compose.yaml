services:
  gateway:
    build: gateway
    # ports:
    # TODO: to be decided
    restart: unless-stopped

  broker:
    image: eclipse-mosquitto:alpine
    ports:
      - 1883:1883
      - 9001:9001
    volumes:
      # mosquitto stock
      - ./broker/config:/mosquitto/config
      - ./broker/data:/mosquitto/data
      - ./broker/log:/mosquitto/log
      # http_dir
      - ./broker/http:/mosquitto/http
    restart: unless-stopped

  cloud:
    build: cloud
    ports:
      # data in
      - 6000:6000/udp
      # dashboard
      - 1880:1880
    volumes:
      # persistent data
      - ./cloud/data:/data
      # protobuf definitions
      - ./shared/message.proto:/message.proto
    restart: unless-stopped
