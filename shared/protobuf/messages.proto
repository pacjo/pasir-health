syntax = "proto2";

message SleepMessage {
    enum sleep_type {
        AWAKE = 0;
        LIGHT_SLEEP = 1;
        DEEP_SLEEP = 2;
        REM = 3;
    }
    required sleep_type sleepType = 1;
}

message ActivityMessage{
    enum activity_type {
        SWIMMING = 0;
        RUNNING = 1;
        TENNIS = 2;
        GOTHIC = 3;
    }
    required uint32 burntCalories = 1;
    required activity_type activityType = 2;
}

message IdleMessage{
    required double longitude = 1;
    required double latitude = 2;
    required uint32 stepsCount = 3;
}

message HeartbeatMessage{
    required uint32 heartbeat = 1;
}

message AlertMessage{
    required string AlertType = 1;
}